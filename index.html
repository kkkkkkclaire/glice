<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Glice — 花样滑冰技术百科与个人成长日志 PWA">
  <meta name="theme-color" content="#F4F8FB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Glice — 花样滑冰成长日志</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Training -->
    <section id="page-training" class="page active">
      <div class="page-header">
        <h1>❄️ 训练台</h1>
        <p>记录每一次上冰，见证你的成长</p>
      </div>
      <div class="calendar-wrapper">
        <div class="calendar-nav">
          <button onclick="calPrev()" aria-label="上个月">‹</button>
          <span id="cal-month" class="month-label"></span>
          <button onclick="calNext()" aria-label="下个月">›</button>
        </div>
        <div id="cal-grid" class="calendar-grid"></div>
      </div>
      <div id="day-detail" class="day-detail"></div>
      <div class="checkin-panel">
        <div class="checkin-header">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <h3>⛸️ 打卡</h3>
            <button id="duration-display" class="duration-display" onclick="openDurationPicker()" aria-label="上冰时长">
              <span id="dur-text">1小时 00分</span>
              <span class="dur-arrow">▾</span>
            </button>
          </div>
          <button class="btn-save-compact" onclick="saveCheckin()">保存 ✓</button>
        </div>
        <div id="checkin-actions" class="checkin-actions"></div>
      </div>
    </section>

    <!-- Library -->
    <section id="page-library" class="page">
      <div class="page-header">
        <h1>📖 动作库</h1>
        <p>花样滑冰技术百科全书</p>
      </div>
      <div id="cat-tabs" class="cat-tabs"></div>
      <div class="filter-pills">
        <button class="filter-pill active" data-filter="all">全部</button>
        <button class="filter-pill" data-filter="learning">已学习</button>
        <button class="filter-pill" data-filter="unlearned">待挑战</button>
        <button class="filter-pill" data-filter="mastered">已掌握</button>
      </div>
      <div id="action-grid" class="action-grid"></div>

      <div class="add-action-panel mt-panel">
        <h3>✏️ 添加自定义动作</h3>
        <div class="add-action-form">
          <input id="ca-zh" type="text" placeholder="动作名称（中文）">
          <input id="ca-en" type="text" placeholder="English Name (optional)">
          <div class="form-row">
            <select id="ca-cat" aria-label="动作分类">
              <option value="basic">基础滑行</option>
              <option value="jump">跳跃</option>
              <option value="spin">旋转</option>
              <option value="step">步法</option>
              <option value="connect">连接动作</option>
              <option value="custom" selected>自定义</option>
            </select>
            <input id="ca-emoji" type="text" placeholder="图标 如⭐" maxlength="4">
          </div>
          <button class="btn-primary btn-add-action" onclick="addCustomAction()">➕ 添加动作</button>
        </div>
      </div>
    </section>

    <!-- Detail -->
    <section id="page-detail" class="page detail-page">
      <div id="detail-content"></div>
    </section>

    <!-- Achievements -->
    <section id="page-achievements" class="page">
      <div class="page-header">
        <h1>🏆 成就</h1>
        <p>你的滑冰荣誉殿堂</p>
      </div>
      
      <div class="hero-stats-card">
        <div class="hero-stat-item">
          <div class="hero-stat-icon">⏱️</div>
          <div class="hero-stat-info">
            <div class="hero-stat-label">累计冰时</div>
            <div class="hero-stat-value" id="total-ice-time">0 小时</div>
          </div>
        </div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat-item">
          <div class="hero-stat-icon">📅</div>
          <div class="hero-stat-info">
            <div class="hero-stat-label">总上冰天数</div>
            <div class="hero-stat-value" id="total-ice-days">0 天</div>
          </div>
        </div>
      </div>

      <div class="report-card">
        <h3>📊 本月练习报告</h3>
        <div id="report-content"></div>
      </div>

      <div class="badge-section">
        <h3 class="badge-section-title">⏱️ 冰时勋章</h3>
        <div id="time-badges" class="badge-row"></div>
      </div>

      <div class="badge-section">
        <h3 class="badge-section-title">📅 上冰天数勋章</h3>
        <div id="day-badges" class="badge-row"></div>
      </div>

      <div class="badge-section">
        <h3 class="badge-section-title">💪 肌肉记忆勋章</h3>
        <p class="badge-section-desc">某个动作练习 ≥ 10 天即可点亮，每个动作仅一次</p>
        <div id="muscle-badges" class="badge-grid"></div>
      </div>

      <div class="badge-section">
        <h3 class="badge-section-title">🔥 超级肌肉记忆勋章</h3>
        <p class="badge-section-desc">某个动作练习 ≥ 30 天即可点亮，每个动作仅一次</p>
        <div id="super-muscle-badges" class="badge-grid"></div>
      </div>
    </section>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" aria-label="主导航">
    <div class="nav-inner">
      <button class="nav-btn active" data-page="training" aria-label="训练台">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>训练台</span>
      </button>
      <button class="nav-btn" data-page="library" aria-label="动作库">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        <span>动作库</span>
      </button>
      <button class="nav-btn" data-page="achievements" aria-label="成就">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="7"></circle>
          <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
        </svg>
        <span>成就</span>
      </button>
    </div>
  </nav>

  <!-- Duration Picker -->
  <div id="duration-picker-overlay" class="picker-overlay">
    <div class="picker-mask" onclick="closeDurationPicker()"></div>
    <div class="picker-modal">
      <div class="picker-header">
        <button class="picker-cancel" onclick="closeDurationPicker()">取消</button>
        <span class="picker-title">上冰时长</span>
        <button class="picker-confirm" onclick="confirmDuration()">确定</button>
      </div>
      <div class="picker-body">
        <div class="picker-wheels">
          <div class="picker-column">
            <div class="picker-scroll" id="hour-scroll"></div>
            <span class="picker-unit">时</span>
          </div>
          <div class="picker-column">
            <div class="picker-scroll" id="minute-scroll"></div>
            <span class="picker-unit">分</span>
          </div>
          <div class="picker-highlight-bar"></div>
          <div class="picker-fade picker-fade-top"></div>
          <div class="picker-fade picker-fade-bottom"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
