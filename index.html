<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Glice — 花样滑冰技术百科与个人成长日志 PWA">
  <meta name="theme-color" content="#0B1929">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Glice — 花样滑冰成长日志</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ═══ Training Page ═══ -->
    <section id="page-training" class="page active">
      <div class="page-header">
        <h1>❄️ 训练台</h1>
        <p>记录每一次上冰，见证你的成长</p>
      </div>

      <!-- Calendar -->
      <div class="calendar-wrapper">
        <div class="calendar-nav">
          <button onclick="calPrev()" aria-label="上个月">‹</button>
          <span id="cal-month" class="month-label"></span>
          <button onclick="calNext()" aria-label="下个月">›</button>
        </div>
        <div id="cal-grid" class="calendar-grid"></div>
      </div>

      <!-- Day detail -->
      <div id="day-detail" class="day-detail"></div>

      <!-- Checkin -->
      <div class="checkin-panel">
        <h3>⛸️ 今日打卡</h3>
        <div id="checkin-actions" class="checkin-actions"></div>
        <button class="btn-primary" onclick="saveCheckin()">✅ 保存练习记录</button>
      </div>
    </section>

    <!-- ═══ Library Page ═══ -->
    <section id="page-library" class="page">
      <div class="page-header">
        <h1>📖 动作库</h1>
        <p>花样滑冰技术百科全书</p>
      </div>

      <div id="cat-tabs" class="cat-tabs"></div>

      <div class="filter-pills">
        <button class="filter-pill active" data-filter="all">全部</button>
        <button class="filter-pill" data-filter="learning">已学习</button>
        <button class="filter-pill" data-filter="unlearned">待挑战</button>
      </div>

      <div id="action-grid" class="action-grid"></div>
    </section>

    <!-- ═══ Detail Page ═══ -->
    <section id="page-detail" class="page detail-page">
      <div id="detail-content"></div>
    </section>

    <!-- ═══ Achievements Page ═══ -->
    <section id="page-achievements" class="page">
      <div class="page-header">
        <h1>🏆 成就</h1>
        <p>你的滑冰荣誉殿堂</p>
      </div>

      <div class="report-card">
        <h3>📊 本月练习报告</h3>
        <div id="report-content"></div>
      </div>

      <h3 style="font-family:var(--font-display);font-weight:600;margin-bottom:12px;padding:0 4px;">🏅 肌肉记忆勋章墙</h3>
      <div id="medal-grid" class="medal-grid"></div>
    </section>
  </div>

  <!-- ═══ Bottom Navigation ═══ -->
  <nav class="bottom-nav" aria-label="主导航">
    <div class="nav-inner">
      <button class="nav-btn active" data-page="training" aria-label="训练台">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>训练台</span>
      </button>
      <button class="nav-btn" data-page="library" aria-label="动作库">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span>动作库</span>
      </button>
      <button class="nav-btn" data-page="achievements" aria-label="成就">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
        </svg>
        <span>成就</span>
      </button>
    </div>
  </nav>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
